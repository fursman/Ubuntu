# ============================================================================
# Hyprland Configuration — Deluxe Edition
# ============================================================================

# ── Monitors ──
monitor=,highres@highrr,0x0,1.0
monitor=,highres@highrr,auto,1.0

# ── Autostart ──
exec-once = waybar
exec-once = awww-daemon && sleep 0.5 && awww img --transition-type center --transition-step 2 --transition-fps 60 ~/Pictures/Wallpapers/current.jpg
exec-once = swayosd-server
exec-once = swaync
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = sleep 3 && hyprctl keyword misc:disable_hyprland_logo true
exec-once = swayidle -w timeout 3600 '~/.local/bin/lock-screen' timeout 3660 'hyprctl dispatch dpms off' resume 'hyprctl dispatch dpms on' before-sleep '~/.local/bin/lock-screen'

# ── Environment ──
env = XCURSOR_SIZE,48
env = XCURSOR_THEME,Adwaita
env = GTK_THEME,Dracula
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_QPA_PLATFORM,wayland
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1

# Machine-specific overrides (NVIDIA env vars, DRM devices, etc.)
# Generated by setup.sh — edit for your hardware if needed
source = ~/.config/hypr/env-local.conf

# ── Input ──
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0.5
    touchpad {
        natural_scroll = yes
        drag_lock = true
        tap-and-drag = true
    }
}

# ── General ──
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(0000FFee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
    resize_on_border = true
}

# ── Misc ──
cursor {
    no_hardware_cursors = true
}
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    animate_manual_resizes = true
    animate_mouse_windowdragging = true
}

# ── Decoration ──
decoration {
    blur {
        enabled = true
        size = 10
        passes = 3
        xray = false
        noise = 0.02
        contrast = 1.0
        brightness = 1.0
        vibrancy = 0.2
        popups = true
    }
    rounding = 10
    shadow {
        enabled = true
        range = 15
        render_power = 3
        color = rgba(1a1a1aee)
    }
    active_opacity = 1
    inactive_opacity = 0.9
    dim_inactive = true
    dim_strength = 0.1
}

# ── Animations (Smooth & Refined) ──
animations {
    enabled = yes

    # Curves
    bezier = easeOutQuint, 0.22, 1, 0.36, 1
    bezier = easeInQuint, 0.64, 0, 0.78, 0
    bezier = easeOutExpo, 0.16, 1, 0.3, 1
    bezier = easeInExpo, 0.7, 0, 0.84, 0
    bezier = liner, 1, 1, 1, 1
    bezier = smooth, 0.4, 0, 0.2, 1

    # Windows scale in, fade out
    animation = windows, 1, 5, easeOutQuint, slide
    animation = windowsIn, 1, 5, easeOutQuint, popin 80%
    animation = windowsOut, 1, 4, easeInQuint, popin 80%
    animation = windowsMove, 1, 5, smooth, slide

    # Smooth fades
    animation = fade, 1, 5, smooth
    animation = fadeIn, 1, 4, easeOutExpo
    animation = fadeOut, 1, 4, easeInExpo

    # Borders
    animation = border, 1, 10, smooth
    animation = borderangle, 1, 80, liner, loop

    # Workspaces glide with fade
    animation = workspaces, 1, 5, easeOutQuint, slidefade 30%
    animation = specialWorkspace, 1, 5, easeOutExpo, slidevert

    # Layers
    animation = layers, 1, 4, easeOutQuint, popin 90%
}

# ── Layout ──
dwindle {
    pseudotile = yes
    preserve_split = yes
    smart_split = false
    smart_resizing = true
}

# ── Window Rules ──
windowrule = match:class ^(pavucontrol)$, float on
windowrule = match:class ^(blueman-manager)$, float on
windowrule = match:class ^(nm-connection-editor)$, float on
windowrule = match:class ^(org.gnome.seahorse.Application)$, float on
windowrule = match:title ^(File Upload)(.*)$, float on
windowrule = match:title ^(Save As)(.*)$, float on
windowrule = match:title ^(Open File)(.*)$, float on
windowrule = match:class ^(xdg-desktop-portal-gtk)$, float on
windowrule = match:class ^(org.gnome.Calculator)$, float on
windowrule = match:class ^(thunar)$, match:title ^(File Operation Progress)$, float on
windowrule = match:class ^(Rofi)$, float on
windowrule = match:class ^(Rofi)$, stay_focused on
windowrule = match:class ^(Rofi)$, dim_around on
windowrule = match:title ^(Picture-in-Picture)$, float on
windowrule = match:title ^(Picture-in-Picture)$, pin on
windowrule = match:title ^(Picture-in-Picture)$, size 480 270
windowrule = match:title ^(Picture-in-Picture)$, move 100%-490 100%-280
windowrule = match:class ^(scratchpad)$, float on
windowrule = match:class ^(scratchpad)$, size 80% 60%
windowrule = match:class ^(scratchpad)$, center on
windowrule = match:class ^(scratchpad)$, animation slide
layerrule = match:namespace swaync-control-center, blur on
layerrule = match:namespace swaync-notification-window, blur on
layerrule = match:namespace swaync-control-center, ignore_alpha 1
layerrule = match:namespace swaync-notification-window, ignore_alpha 1

# ── Special Workspaces (Scratchpads) ──
workspace = special:scratchpad, on-created-empty:kitty --class scratchpad
workspace = special:music, on-created-empty:kitty --class scratchpad -e playerctl metadata --follow

# ── Key Bindings ──
$mainMod = SUPER

# Wallpaper cycling (Home/End keys)
bind = , Home, exec, ~/.local/bin/wallpaper-cycle prev
bind = , End, exec, ~/.local/bin/wallpaper-cycle next

# Apps
bind = $mainMod, RETURN, exec, rofi -show drun -theme spotlight-dark
bind = $mainMod, T, exec, kitty
bind = $mainMod, Q, killactive,
bind = $mainMod, X, exec, wlogout --protocol layer-shell
bind = $mainMod, B, exec, firefox
bind = $mainMod ALT, B, exec, chromium-browser
bind = $mainMod, F, exec, thunar
bind = $mainMod, K, exec, seahorse
bind = $mainMod, A, exec, pavucontrol
bind = $mainMod, S, exec, signal-desktop
bind = $mainMod, R, exec, flatpak run org.gnome.World.PikaBackup
bind = $mainMod, L, exec, ~/.local/bin/lock-screen
bind = $mainMod, P, pseudo,
bind = $mainMod, J, togglesplit,
bind = $mainMod, ESCAPE, fullscreen
bind = $mainMod, space, exec, ~/.local/bin/hypr-cheatsheet
bind = $mainMod, V, exec, cliphist list | rofi -dmenu -theme spotlight-dark -p "Clipboard" | cliphist decode | wl-copy
bind = $mainMod, N, exec, swaync-client -t -sw
bind = $mainMod, grave, togglespecialworkspace, scratchpad
bind = $mainMod SHIFT, C, exec, grim -g "$(slurp -p)" -t ppm - | convert - -format '%[hex:p{0,0}]' txt:- | tail -1 | cut -d' ' -f4 | wl-copy && notify-send "Color Copied" "$(wl-paste)"

# Volume / Brightness / Caps (SwayOSD)
bind = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
bind = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bind = , XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
bind = , XF86AudioMicMute, exec, swayosd-client --input-volume mute-toggle
bindl = , Caps_Lock, exec, swayosd-client --caps-lock
bind = , XF86MonBrightnessUp, exec, swayosd-client --brightness raise
bind = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower

# Media Keys
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioPause, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous
bind = , XF86AudioStop, exec, playerctl stop

# Screenshots
bind = , Print, exec, grim - | wl-copy && notify-send "Screen Captured" "Full screen -> Clipboard"
bind = $mainMod, F12, exec, grim ~/Pictures/Screenshot-$(date +'%Y-%m-%d-%H-%M-%S').png && notify-send "Screen Captured" "Saved to ~/Pictures"
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp -d)" - | wl-copy && notify-send "Region Captured" "Selection -> Clipboard"
bind = $mainMod SHIFT, F12, exec, grim -g "$(slurp -d)" ~/Pictures/Screenshot-$(date +'%Y-%m-%d-%H-%M-%S').png && notify-send "Region Captured" "Saved to ~/Pictures"

# Screen Recording
bind = $mainMod SHIFT, R, exec, pkill wf-recorder || wf-recorder -g "$(slurp)" -f ~/Videos/Recording-$(date +'%Y-%m-%d-%H-%M-%S').mp4 && notify-send "Recording Saved"
bind = $mainMod ALT, R, exec, pkill wf-recorder || wf-recorder -f ~/Videos/Recording-$(date +'%Y-%m-%d-%H-%M-%S').mp4 && notify-send "Recording Saved"

# Focus / Move / Resize
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d
bind = $mainMod CTRL, left, resizeactive, -40 0
bind = $mainMod CTRL, right, resizeactive, 40 0
bind = $mainMod CTRL, up, resizeactive, 0 -40
bind = $mainMod CTRL, down, resizeactive, 0 40

# Float / Pin / Center
bind = $mainMod SHIFT, F, togglefloating,
bind = $mainMod SHIFT, P, pin,
bind = $mainMod SHIFT, space, centerwindow,

# Group (tabbed)
bind = $mainMod, G, togglegroup,
bind = $mainMod, TAB, changegroupactive, f

# Workspaces 1-10
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
bind = $mainMod ALT, 1, movetoworkspacesilent, 1
bind = $mainMod ALT, 2, movetoworkspacesilent, 2
bind = $mainMod ALT, 3, movetoworkspacesilent, 3
bind = $mainMod ALT, 4, movetoworkspacesilent, 4
bind = $mainMod ALT, 5, movetoworkspacesilent, 5

# Mouse
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
