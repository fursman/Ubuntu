# ============================================================================
# Hyprland Configuration — Deluxe Edition
# ============================================================================

# ── Monitors ──
monitor=,highres@highrr,0x0,1.0
monitor=,highres@highrr,auto,1.0

# ── Autostart ──
exec-once = waybar
exec-once = hyprpaper
exec-once = swayosd-server
exec-once = swaync
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = sleep 3 && hyprctl keyword misc:disable_hyprland_logo true
exec-once = swayidle -w timeout 300 '~/.local/bin/lock-screen' timeout 600 'hyprctl dispatch dpms off' resume 'hyprctl dispatch dpms on'

# ── Environment ──
env = XCURSOR_SIZE,48
env = XCURSOR_THEME,Adwaita
env = GTK_THEME,Dracula
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_QPA_PLATFORM,wayland
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
# Force Hyprland to the known-good RTX 4090 DRM node (avoid unsupported secondary GPU)
# Multi-GPU display exposure (4090 first, Titan V second). ':' is wlroots list separator.
env = WLR_DRM_DEVICES,/dev/dri/card1:/dev/dri/card0
# NVIDIA + wlroots compatibility knobs
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = LIBVA_DRIVER_NAME,nvidia
env = WLR_NO_HARDWARE_CURSORS,1

# ── Input ──
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0.5
    touchpad {
        natural_scroll = yes
        drag_lock = true
        tap-and-drag = true
    }
}

# ── General ──
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(0000FFee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
    resize_on_border = true
}

# ── Misc ──
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    animate_manual_resizes = true
    animate_mouse_windowdragging = true
}

# ── Decoration ──
decoration {
    blur {
        enabled = true
        size = 10
        passes = 3
        new_optimizations = on
        xray = false
        noise = 0.02
        contrast = 1.0
        brightness = 1.0
        vibrancy = 0.2
        popups = true
    }
    rounding = 10
    active_opacity = 1
    inactive_opacity = 0.9
    dim_inactive = true
    dim_strength = 0.1
    drop_shadow = true
    shadow_range = 15
    shadow_render_power = 3
    col.shadow = rgba(1a1a1aee)
}

# ── Animations (Deluxe) ──
animations {
    enabled = yes
    bezier = wind, 0.05, 0.9, 0.1, 1.05
    bezier = winIn, 0.1, 1.1, 0.1, 1.1
    bezier = winOut, 0.3, -0.3, 0, 1
    bezier = liner, 1, 1, 1, 1
    bezier = overshot, 0.05, 0.9, 0.1, 1.1
    animation = windows, 1, 6, wind, slide
    animation = windowsIn, 1, 6, winIn, slide
    animation = windowsOut, 1, 5, winOut, slide
    animation = windowsMove, 1, 5, wind, slide
    animation = border, 1, 1, liner
    animation = borderangle, 1, 30, liner, loop
    animation = fade, 1, 10, default
    animation = workspaces, 1, 5, wind
    animation = specialWorkspace, 1, 5, overshot, slidevert
}

# ── Layout ──
dwindle {
    pseudotile = yes
    preserve_split = yes
    smart_split = false
    smart_resizing = true
}

# ── Gestures ──
gestures {
    workspace_swipe = on
    workspace_swipe_fingers = 3
    workspace_swipe_distance = 300
    workspace_swipe_cancel_ratio = 0.3
}

# ── Window Rules ──
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = float, class:^(org.gnome.seahorse.Application)$
windowrulev2 = float, title:^(File Upload)(.*)$
windowrulev2 = float, title:^(Save As)(.*)$
windowrulev2 = float, title:^(Open File)(.*)$
windowrulev2 = float, class:^(xdg-desktop-portal-gtk)$
windowrulev2 = float, class:^(org.gnome.Calculator)$
windowrulev2 = float, class:^(thunar)$,title:^(File Operation Progress)$
windowrulev2 = float, class:^(Rofi)$
windowrulev2 = stayfocused, class:^(Rofi)$
windowrulev2 = dimaround, class:^(Rofi)$
windowrulev2 = float, title:^(Picture-in-Picture)$
windowrulev2 = pin, title:^(Picture-in-Picture)$
windowrulev2 = size 480 270, title:^(Picture-in-Picture)$
windowrulev2 = move 100%-490 100%-280, title:^(Picture-in-Picture)$
windowrulev2 = float, class:^(scratchpad)$
windowrulev2 = size 80% 60%, class:^(scratchpad)$
windowrulev2 = center, class:^(scratchpad)$
windowrulev2 = animation slide, class:^(scratchpad)$
layerrule = blur, swaync-control-center
layerrule = blur, swaync-notification-window
layerrule = ignorezero, swaync-control-center
layerrule = ignorezero, swaync-notification-window

# ── Special Workspaces (Scratchpads) ──
workspace = special:scratchpad, on-created-empty:kitty --class scratchpad
workspace = special:music, on-created-empty:kitty --class scratchpad -e playerctl metadata --follow

# ── Key Bindings ──
$mainMod = SUPER
bind = $mainMod, RETURN, exec, rofi -show drun -theme spotlight-dark
bind = $mainMod, T, exec, kitty
bind = $mainMod, Q, killactive,
bind = $mainMod, X, exec, wlogout --protocol layer-shell
bind = $mainMod, B, exec, firefox
bind = $mainMod ALT, B, exec, chromium-browser
bind = $mainMod, F, exec, thunar
bind = $mainMod, K, exec, seahorse
bind = $mainMod, A, exec, pavucontrol
bind = $mainMod, L, exec, ~/.local/bin/lock-screen
bind = $mainMod, P, pseudo,
bind = $mainMod, J, togglesplit,
bind = $mainMod, ESCAPE, fullscreen
bind = $mainMod, space, exec, ~/.local/bin/hypr-cheatsheet
bind = $mainMod, V, exec, cliphist list | rofi -dmenu -theme spotlight-dark -p "Clipboard" | cliphist decode | wl-copy
bind = $mainMod, N, exec, swaync-client -t -sw
bind = $mainMod, grave, togglespecialworkspace, scratchpad
bind = $mainMod SHIFT, C, exec, grim -g "$(slurp -p)" -t ppm - | convert - -format '%[hex:p{0,0}]' txt:- | tail -1 | cut -d' ' -f4 | wl-copy && notify-send "Color Copied" "$(wl-paste)"
bind = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
bind = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bind = , XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
bind = , XF86AudioMicMute, exec, swayosd-client --input-volume mute-toggle
bindl = , Caps_Lock, exec, swayosd-client --caps-lock
bind = , XF86MonBrightnessUp, exec, swayosd-client --brightness raise
bind = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioPause, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous
bind = , XF86AudioStop, exec, playerctl stop
bind = , Print, exec, grim - | wl-copy && notify-send "Screen Captured" "Full screen → Clipboard"
bind = $mainMod, F12, exec, grim ~/Pictures/Screenshot-$(date +'%Y-%m-%d-%H-%M-%S').png && notify-send "Screen Captured" "Saved to ~/Pictures"
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp -d)" - | wl-copy && notify-send "Region Captured" "Selection → Clipboard"
bind = $mainMod SHIFT, F12, exec, grim -g "$(slurp -d)" ~/Pictures/Screenshot-$(date +'%Y-%m-%d-%H-%M-%S').png && notify-send "Region Captured" "Saved to ~/Pictures"
bind = $mainMod SHIFT, R, exec, pkill wf-recorder || wf-recorder -g "$(slurp)" -f ~/Videos/Recording-$(date +'%Y-%m-%d-%H-%M-%S').mp4 && notify-send "Recording Saved"
bind = $mainMod ALT, R, exec, pkill wf-recorder || wf-recorder -f ~/Videos/Recording-$(date +'%Y-%m-%d-%H-%M-%S').mp4 && notify-send "Recording Saved"
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d
bind = $mainMod CTRL, left, resizeactive, -40 0
bind = $mainMod CTRL, right, resizeactive, 40 0
bind = $mainMod CTRL, up, resizeactive, 0 -40
bind = $mainMod CTRL, down, resizeactive, 0 40
bind = $mainMod SHIFT, F, togglefloating,
bind = $mainMod SHIFT, P, pin,
bind = $mainMod SHIFT, space, centerwindow,
bind = $mainMod, G, togglegroup,
bind = $mainMod, TAB, changegroupactive, f
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
bind = $mainMod ALT, 1, movetoworkspacesilent, 1
bind = $mainMod ALT, 2, movetoworkspacesilent, 2
bind = $mainMod ALT, 3, movetoworkspacesilent, 3
bind = $mainMod ALT, 4, movetoworkspacesilent, 4
bind = $mainMod ALT, 5, movetoworkspacesilent, 5
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
